name: Docker Image Downloader

on:
  workflow_dispatch: 

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        # 这一步是为了清理 GitHub 虚拟机的空间，防止镜像太大导致磁盘满
        run: |
          sudo docker image prune -a -f
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          
      - name: Pull and Save Image
        run: |
          echo "正在拉取镜像..."
          docker pull openclaw/openclaw:latest
          echo "正在导出为 tar 文件..."
          # 使用更通用的路径，并加上详细输出查看进度
          docker save openclaw/openclaw:latest > openclaw_image.tar
          ls -lh openclaw_image.tar # 查看文件大小，确认导出成功
          
      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-tar-file
          path: ./openclaw_image.tar
          if-no-files-found: error
          retention-days: 1
